<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog do Roblox</title>
    <style>
        /* Estilos Gerais */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e5e5e5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        /* Cabeçalho */
        header {
            background-color: #232527; /* Cor escura estilo Roblox */
            color: #ffffff;
            text-align: center;
            padding: 40px 20px;
            border-bottom: 5px solid #00a2ff; /* Detalhe em azul */
        }

        header h1 {
            margin: 0 0 10px 0;
            font-size: 2.5rem;
        }

        header p {
            margin: 0;
            font-size: 1.2rem;
            color: #bdc3c7;
            font-weight: normal;
        }

        /* Principal */
        main {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 25px; /* Espaço entre os artigos */
        }

        /* Artigos/Posts */
        article {
            background-color: #ffffff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Responsividade para telas maiores: imagem do lado do texto */
        @media (min-width: 600px) {
            article {
                flex-direction: row;
            }
        }

        /* Imagens dos artigos */
        article img {
            width: 100%;
            max-width: 200px;
            height: auto;
            border-radius: 8px;
            object-fit: cover;
        }

        /* Conteúdo dos Textos */
        .conteudo {
            flex: 1;
        }

        .conteudo h2 {
            margin-top: 0;
            color: #232527;
        }

        .artigo-autor {
            font-size: 0.9rem;
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 15px;
        }

        .conteudo p {
            line-height: 1.6;
        }
